version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    # environment:
    #   POSTGRES_USER: postgres
    #   POSTGRES_PASSWORD: 123456
    #   POSTGRES_DB: metaland
    ports:
      - "5432:5432"
    volumes:
      - ./.data/pgsql:/var/lib/postgresql/data